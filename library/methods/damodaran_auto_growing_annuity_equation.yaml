rules:
- id: rule_pv_calculation
  description: Calculates the present value of future cash flows with a constant growth
    rate.
  check: (pe < (1 / ((roe - net_debt_ebitda) - eps * 0.05)) and pe > 0)
- id: rule_growth_rate_check
  description: Ensures that the growth rate is positive and reasonable.
  check: (eps >= 0.05 and roe >= 0.15)
caveats:
- This method assumes a constant growth rate, which may not be realistic for all companies.
