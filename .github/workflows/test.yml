name: pytest CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Print Python version
        run: python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt may be UTF-16 (Windows-authored); try it first,
          # fall back to known-good minimal set if pip can't parse it.
          pip install -r requirements.txt || \
            pip install pyyaml requests python-dotenv pytest
          # Ensure pytest is always present regardless of requirements.txt outcome
          pip install pytest

      - name: Show installed packages
        run: pip list

      - name: Run tests
        # test_typed_outputs self-skips when Ollama is unavailable (no marker needed).
        # test_fallback + test_agent_governance + test_strategies are 100% offline.
        # continue-on-error surfaces failures without blocking solo-developer merges.
        continue-on-error: true
        run: |
          pytest tests/ -v -k "not ollama"
