# br_dividend_compounders.yaml — empresas B3 com histórico consistente de
# dividendos (≥10 anos ininterruptos). Equivalente BR aos Kings/Aristocrats US
# mas sem certificação S&P.
#
# Fonte: user-curated (2026-04-21) baseado em prática de mercado brasileiro.
# B3 não tem índice oficial de aristocrats. Esta lista é defensiva — inclui
# nomes com track record de 10+ anos de payouts regulares, mesmo que sem
# crescimento ano-a-ano.
#
# kind:
#   stable_payer   — ≥10 anos ininterruptos com payouts regulares
#   growing_payer  — ≥10 anos com tendência de crescimento
#   cyclical_payer — ≥10 anos mas com oscilações materiais (ex: bancos/commodities)
#
# in_universe: true → já está em config/universe.yaml (holding, watchlist ou research_pool)
# `streak_years` é aproximação — validar via fetchers + dividends table.

