  source: user_curated
  date: "2026-04-21"
  total: 18
  note: "B3 não tem Aristocrat oficial. Lista pragmática de dividend-reliable tickers."
  selection_criteria: "≥10 anos de dividendos/JCP ininterruptos; sector bias utilities+banks"

