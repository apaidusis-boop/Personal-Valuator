# aliases.yaml — mapping entre tickers/temas e variantes em linguagem natural.
#
# Crítico para o router em PT: falantes dizem "Itaúsa" não "ITSA4",
# "Klabin" não "KLBN4", "a Coca" não "KO". Sem isto o router não apanha.
#
# Estrutura:
#   tickers:
#     <TICKER>:
#       market: br|us
#       names:    [variantes do nome da empresa — PT e EN]
#       products: [produtos/marcas emblemáticas]
#       people:   [CEO, CFO, fundador — se costumam ser citados]
#   themes:
#     <slug>:
#       keywords: [palavras/expressões que sinalizam o tema]
#
# Regras de matching (implementadas em youtube/router.py):
#  - case-insensitive, whole-word (regex \b)
#  - acentos contam (Itaúsa ≠ Itausa → listar AMBAS)
#  - match em qualquer variant da lista → hit no ticker/tema
#
# Primeira versão gerada a partir de config/universe.yaml.
# Adicionar à mão apelidos/jargão de lives conforme forem aparecendo.

