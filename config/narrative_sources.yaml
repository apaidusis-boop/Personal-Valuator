# narrative_sources.yaml — fontes de onde o pipeline de narrativa lê.
#
# Filosofia idêntica ao universe.yaml: toda a edição (adicionar/remover
# canais, mudar peso) é feita AQUI. Nenhum scraper em narrative/ tem URLs
# hardcoded.
#
# Pesos:
#   weight     — multiplicador no score agregado (1.0 = default).
#                Usar 0.5 para fontes ruidosas/sensacionalistas e 1.5 para
#                analistas de referência. Extremos (2.0+) apenas para fontes
#                institucionais de alta confiança.
#
# Bias flags (informativo, não usado ainda — serve para o classifier saber
# calibrar):
#   bias: neutral | bullish | bearish | growth | value | retail | institutional
#
# enabled=false deixa a fonte no ficheiro mas desactiva scraping.

# ============================================================================
# MACRO ESTRUTURADO — não é narrativa, é input do regime.py. Já parcialmente
# no pipeline via bcb_fetcher.py. Listado aqui para referência.
# ============================================================================
macro_sources:
  br:
    - { id: bcb_sgs,       name: "BCB SGS (SELIC/CDI/IPCA/PTAX)", status: "já implementado (bcb_fetcher.py)" }
    - { id: bcb_focus,     name: "Boletim Focus",                  status: "TODO: API pública BCB" }
    - { id: ibge_ibc_br,   name: "IBC-Br (proxy PIB mensal)",     status: "TODO: SIDRA/IBGE" }
    - { id: copom_atas,    name: "Atas COPOM",                     status: "TODO: parser PDF" }
  us:
    - { id: fred,          name: "FRED (FEDFUNDS, UNRATE, CPI, DGS10, DGS2, DXY)", status: "TODO: fredapi" }
    - { id: cboe_vix,      name: "CBOE VIX",                        status: "TODO: yfinance ^VIX" }
    - { id: fomc_statements, name: "FOMC statements + minutes",     status: "TODO: federalreserve.gov" }
    - { id: bls_jobs,      name: "BLS monthly jobs report",         status: "TODO" }

# ============================================================================
# RSS — fonte primária de narrativa. Baixo custo, alta cobertura.
# ============================================================================
rss:
  br:
    - { id: infomoney,       name: "InfoMoney",              url: "https://www.infomoney.com.br/feed/",                 lang: pt, weight: 1.0, bias: neutral,        enabled: true }
    - { id: valor,           name: "Valor Econômico",        url: "https://valor.globo.com/rss/",                        lang: pt, weight: 1.5, bias: institutional, enabled: true,  note: "paywall parcial — headlines grátis" }
    - { id: brazil_journal,  name: "Brazil Journal",         url: "https://braziljournal.com/feed/",                     lang: pt, weight: 1.5, bias: institutional, enabled: true }
    - { id: money_times,     name: "Money Times",            url: "https://www.moneytimes.com.br/feed/",                 lang: pt, weight: 0.8, bias: retail,        enabled: true }
    - { id: seu_dinheiro,    name: "Seu Dinheiro (Empiricus)", url: "https://www.seudinheiro.com/feed/",                 lang: pt, weight: 0.8, bias: retail,        enabled: true }
    - { id: suno_noticias,   name: "Suno Notícias",          url: "https://www.suno.com.br/noticias/feed/",              lang: pt, weight: 1.0, bias: value,         enabled: true }
    - { id: estadao_econ,    name: "Estadão Economia",       url: "https://www.estadao.com.br/rss/economia.xml",         lang: pt, weight: 1.0, bias: neutral,       enabled: true }
    - { id: folha_mercado,   name: "Folha Mercado",          url: "https://feeds.folha.uol.com.br/mercado/rss091.xml",   lang: pt, weight: 1.0, bias: neutral,       enabled: true }
    - { id: exame_invest,    name: "Exame Invest",           url: "https://exame.com/invest/feed/",                      lang: pt, weight: 0.8, bias: retail,        enabled: true }
  us:
    - { id: reuters_business, name: "Reuters Business",      url: "https://www.reutersagency.com/feed/?best-topics=business-finance&post_type=best", lang: en, weight: 1.5, bias: institutional, enabled: true }
    - { id: seeking_alpha,    name: "Seeking Alpha (market)",url: "https://seekingalpha.com/market_currents.xml",         lang: en, weight: 1.0, bias: neutral,       enabled: true }
    - { id: yahoo_finance,    name: "Yahoo Finance",          url: "https://finance.yahoo.com/news/rssindex",              lang: en, weight: 0.8, bias: neutral,       enabled: true }
    - { id: cnbc_markets,     name: "CNBC Markets",           url: "https://www.cnbc.com/id/10000664/device/rss/rss.html", lang: en, weight: 1.0, bias: neutral,       enabled: true }
    - { id: marketwatch,      name: "MarketWatch Top",        url: "https://feeds.marketwatch.com/marketwatch/topstories/", lang: en, weight: 1.0, bias: neutral,      enabled: true }
    - { id: wsj_markets,      name: "WSJ Markets",            url: "https://feeds.a.dj.com/rss/RSSMarketsMain.xml",        lang: en, weight: 1.5, bias: institutional, enabled: true, note: "paywall — headlines apenas" }
    - { id: ft_markets,       name: "FT Markets",             url: "https://www.ft.com/markets?format=rss",                lang: en, weight: 1.5, bias: institutional, enabled: false, note: "paywall forte — activar só se subscrito" }
    - { id: zerohedge,        name: "ZeroHedge",              url: "https://cms.zerohedge.com/fullrss2.xml",               lang: en, weight: 0.5, bias: bearish,       enabled: true,  note: "útil para capturar pânico precocemente, mas viés forte" }
    - { id: axios_markets,    name: "Axios Markets",          url: "https://api.axios.com/feed/markets",                   lang: en, weight: 1.0, bias: neutral,       enabled: true }

