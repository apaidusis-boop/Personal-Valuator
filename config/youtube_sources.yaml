# youtube_sources.yaml — canais curados para ingestão batch contínua.
#
# Lido por scripts/yt_poll.py (q4h tier). Cada poll:
#   1. Resolve channel.uploads playlist via YouTube API (1 unit/canal/poll)
#   2. Lista últimos N vídeos publicados desde o last_seen_at
#   3. Filtra: shorts/lives/min_duration_sec
#   4. Dedup contra videos table em ambas as DBs
#   5. Dispara yt_ingest_batch.py com IDs novos (Whisper + Ollama local)
#
# State per-channel em data/yt_poll_state.json (last_seen_at, video_ids vistos).
#
# Custo API total estimado: 22 canais × 4 polls/dia = 88 units/dia
# (vs free tier 10000 units/dia = 0.9% da quota).
#
# Tiers de prioridade:
#   high   = poll a cada q4h (~6 polls/dia)
#   medium = poll 2x/dia
#   low    = poll 1x/dia
#
# Tags livre (consumidas pelo digest writer): morning_call, equity_research,
# dividends, macro, news, edu, valuation, deep_dive, podcast, interviews.
#
# Adicionar/remover canais é seguro — poller relê o YAML em cada invocação.

