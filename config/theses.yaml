# theses.yaml — livro de teses por ticker.
#
# Cada ticker com posição ou watchlist activa pode ter uma tese explícita.
# A tese vive aqui (source-of-truth), é lida pelos scripts de análise e
# reporting, e pode ser actualizada manualmente ou pela camada de LLM
# synthesis quando houver eventos materiais.
#
# Campos:
#   intent           — DRIP | GROWTH | COMPOUNDER | TURNAROUND | WIND_DOWN | ETF
#   thesis           — 1-2 frases da tese fundamental
#   why_hold         — razão específica de o ter (vs watchlist)
#   triggers         — lista de eventos/métricas que confirmariam/invalidariam
#   red_flags        — o que, se visto, abriria uma conversa sobre sair
#   target_weight    — % alvo na carteira (opcional)
#   last_review      — data da última validação consciente
#   ri_url           — site de relações com investidores (para próxima fase)
#   source           — quem recomendou/originou a tese (self, XP, BTG, Suno, etc.)

br:
