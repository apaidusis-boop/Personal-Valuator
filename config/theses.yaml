macro_themes:
  selic_alta_br:
    name: Ciclo Selic alta (BR) — 14,75% a.a.
    thesis: Juros reais elevados sustentam renda fixa e FII papel; pressionam equities
      sensíveis a juros (REITs, FII tijolo, high-growth). Enquanto a Selic se mantiver
      > 12%, o prémio de risco de equity exige DY mais altos.
    drivers_positivos:
    - BCB mantém Selic > 12% (forward expectations)
    - IPCA comportado permite real rate alto sustentado
    drivers_negativos:
    - Primeiro corte de Selic sinaliza fim do ciclo
    - Expectativa de desinflação acelerada
    affects_positive:
    - VGIR11
    - RBRX11
    - KNCR11
    - MCCI11
    - MCRF11
    - LFTB11
    - BBDC4
    affects_negative:
    - XPML11
    - BTLG11
    - PVBI11
    - PRIO3
    - VALE3
    last_review: 2026-04-17
  ai_compute_cycle:
    name: Ciclo AI compute / GenAI adoption
    thesis: Hyperscalers (MS, GOOGL, META, AMZN) aumentam capex em AI infra. Monopólio
      de foundries (TSM) + software AI-native (PLTR) capturam valor. Legacy services
      (consulting, adtech) são squeezed por produtividade AI.
    drivers_positivos:
    - Capex hyperscale > $300B/ano
    - TSMC revenue growth > 20% YoY
    drivers_negativos:
    - Sinal de AI capex peak / ROI questionado
    - Regulação antitrust material em AI
    affects_positive:
    - TSM
    - MSFT
    - PLTR
    - PLD
    affects_negative:
    - ACN
    - XP
    - TTD
    last_review: 2026-04-17
  fed_higher_for_longer:
    name: Fed higher-for-longer
    thesis: Terminal rate US > 4% sustentado. Favorece NIMs de bancos; pressiona REITs
      via competição com Treasuries; torna growth compounders mais caros em DCF.
    drivers_positivos:
    - Core PCE > 2.5% persistente
    - Mercado laboral forte
    drivers_negativos:
    - Inflação convergir rápido para 2%
    - Recession signals (yield curve, PMI)
    affects_positive:
    - JPM
    - GS
    - TFC
    - BLK
    affects_negative:
    - O
    - PLD
    - TSLA
    last_review: 2026-04-17
  china_reopening:
    name: China demand — commodities cycle
    thesis: Fluxo de estímulo fiscal chinês sustenta preços de minério, petróleo e
      insumos. Afecta commodity exporters BR.
    drivers_positivos:
    - Iron ore > $100/t
    - China PMI > 50 sustentado
    drivers_negativos:
    - Propriedade chinesa em crise prolongada
    - Política EUA-China escala tensão
    affects_positive:
    - VALE3
    - PRIO3
    affects_negative: []
    last_review: 2026-04-17
  return_to_office:
    name: Return-to-office vs trabalho híbrido
    thesis: Corporativo BR ainda com vacância elevada pós-2020. Re-locação incremental
      mas heterogénea por região (Faria Lima recupera mais rápido que Berrini/Itaim
      fim). Trabalho híbrido reduz demanda estrutural ~15-20% vs pré-COVID.
    drivers_positivos:
    - Return-to-office mandates em empresas grandes
    - Novas locações Faria Lima anunciadas
    drivers_negativos:
    - Novas vacâncias em edifícios AAA
    - Redução headcount tech/startup
    affects_positive:
    - PVBI11
    affects_negative: []
    last_review: 2026-04-17
sectors:
  br.oil_gas:
    name: Petróleo & Gás BR
    thesis: Pricing cíclico dependente de Brent; BR marginais com breakeven atractivo
      mas expostos a volatilidade. PRIO como operador junior com campos de baixo custo;
      PETR4 com política de dividendos ciclical.
    macro_exposure:
    - china_reopening
    drivers:
    - Brent sustentado > $75
    - Produção de poços novos ramping
    - Política de dividendos PETR4 (rebalanceamento)
    risks:
    - Barril abaixo de $65 comprime margens de junior players
    - Eventos ESG / ambientais material
    - Mudança de política royalties
    tickers:
    - PRIO3
    - PETR4
    last_review: 2026-04-17
  br.banks:
    name: Bancos BR
    thesis: Ciclo de crédito em normalização pós-2022. NIM beneficia de Selic alta.
      BBDC em reorganização de rentabilidade; ITUB líder de ROE. Risco de inadimplência
      elevada em SMB.
    macro_exposure:
    - selic_alta_br
    drivers:
    - ROE do sector normalizando para 18-20%
    - Inadimplência SMB normalizando
    - Spread com Selic alta favorece funding
    risks:
    - Novo ciclo de alta de PDD / inadimplência
    - Pressão regulatória em taxa de juros
    tickers:
    - BBDC4
    - ITUB4
    - BBAS3
    last_review: 2026-04-17
  br.mining:
    name: Mineração BR (Iron Ore)
    thesis: Vale dominante em iron ore premium. Exposição directa a demanda China.
      ESG/ambiental como wildcard pós-Brumadinho.
    macro_exposure:
    - china_reopening
    drivers:
    - Iron ore price > $100/t
    - Recuperação China propriedade / steel demand
    risks:
    - Evento ESG material (Brumadinho 2.0)
    - Crise prolongada propriedade China
    tickers:
    - VALE3
    last_review: 2026-04-17
  br.holding:
    name: Holdings de conglomerado BR
    thesis: Holdings como ITSA4 oferecem exposição diversificada a banco + industrial
      + utilities + agro, com desconto estrutural vs NAV.
    macro_exposure:
    - selic_alta_br
    drivers:
    - Apreciação das investidas (Itaú, Alpargatas, Dexco, Aegea)
    - Distribuição de dividendos recebidos
    risks:
    - Deterioração material de investida dominante (Itaú)
    - Reorganização societária adversa
    tickers:
    - ITSA4
    last_review: 2026-04-17
  br.fii_papel:
    name: FIIs de Papel (CRI)
    thesis: DY muito elevado sustentado pela Selic alta. Portfolio de CRIs pulverizado.
      Compete com CDI directamente mas adiciona spread de risco de crédito. Vulnerável
      a corte de Selic mas resiliente a vacância física.
    macro_exposure:
    - selic_alta_br
    drivers:
    - Selic sustentada > 12% mantém DY alto
    - Default rate de CRIs < 2%
    risks:
    - Corte agressivo de Selic descontecta yield
    - Default material de CRI específico no portfolio
    - Crise de liquidez no mercado secundário
    tickers:
    - VGIR11
    - RBRX11
    - KNCR11
    - MCCI11
    - MCRF11
    - RECR11
    - VRTA11
    - RBRY11
    last_review: 2026-04-17
  br.fii_shoppings:
    name: FIIs Tijolo — Shoppings
    thesis: Recuperação pós-COVID consolidada. Mall traffic estável. Indexação IPCA
      protege em cenários inflacionários mas sofre com Selic alta na comparação com
      renda fixa.
    macro_exposure:
    - selic_alta_br
    drivers:
    - Vendas same-store growth > IPCA
    - Ocupação > 95%
    - Indexação aluguel IPCA
    risks:
    - E-commerce continuar a capturar share
    - Selic alta mantém pressão de desconto vs CDI
    tickers:
    - XPML11
    - VISC11
    - PMLL11
    last_review: 2026-04-17
  br.fii_logistica:
    name: FIIs Tijolo — Logística
    thesis: Demanda estrutural de e-commerce + nearshoring. Rent escalation indexed
      IPCA. Sector relativamente defensivo.
    macro_exposure:
    - selic_alta_br
    drivers:
    - E-commerce share growth
    - Ocupação > 97%
    - Nearshoring capex dos operadores
    risks:
    - Oversupply de novas GLAs
    - 'Selic alta pressiona valuations (ex: P/VP 1.01 BTLG)'
    tickers:
    - BTLG11
    - HGLG11
    - XPLG11
    - BRCO11
    - GARE11
    last_review: 2026-04-17
  br.fii_corporativo:
    name: FIIs Tijolo — Escritórios
    thesis: Turnaround de vacância. Retorno ao escritório incremental mas heterogéneo.
      Faria Lima recupera mais rápido que periferia. Tese dependente de re-locação
      de imóveis vagos específicos.
    macro_exposure:
    - selic_alta_br
    - return_to_office
    drivers:
    - Vacância caindo em premium Faria Lima
    - Novas contratações ou ampliações anunciadas
    - Mandates de return-to-office (corporates grandes)
    risks:
    - Trabalho híbrido permanente reduz demanda estrutural
    - Novas vacâncias em outros imóveis do portfolio
    - Dividendo cortado para preservar caixa
    tickers:
    - PVBI11
    - KNRI11
    last_review: 2026-04-17
  br.fii_hibrido:
    name: FIIs Híbridos (tijolo + papel)
    thesis: Diversificação entre tijolo físico e CRI reduz volatilidade. Menor DY
      que FII papel puro mas mais resiliente a ciclos.
    macro_exposure:
    - selic_alta_br
    drivers:
    - DY 12m > 10%
    - Desconto P/VP > 10% (RBRX11 em 0.87)
    risks:
    - Mistura exposta a ambos os ciclos (tijolo + crédito)
    tickers:
    - RBRX11
