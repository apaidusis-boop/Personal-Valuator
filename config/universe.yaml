# universe.yaml — lista central de todas as empresas seguidas.
# Edita este ficheiro para adicionar/remover tickers. Nenhum código Python
# tem tickers hardcoded — tudo é lido daqui.
#
# Estrutura:
#   holdings        — o que já é da carteira (acções ou FIIs)
#   watchlist       — o que está a ser activamente analisado (screen + scoring)
#   research_pool   — o que sabemos existir em recomendações profissionais mas
#                     NÃO é populado na DB automaticamente. Reserva de ideias.
#
# Campos por entrada:
#   ticker          — símbolo na bolsa de origem (sem .SA para BR)
#   name            — nome legível
#   sector|segment  — sector (acções) ou segmento (FIIs)
#   is_holding      — true/false
#   sources         — de quem vem a recomendação
#                     (XP, BTG-Div, BTG-EqBR, BTG-Val, Suno-Div, Suno-Acoes, Suno-FII, user_pick)
#   cvm_name        — substring para matchear em fatos relevantes CVM
#   suno_target     — preço-teto Suno quando disponível
#   suno_status     — "Comprar" | "Aguardar" quando vem da Suno
#
# Critérios de scoring por mercado vivem em scoring/engine.py.

br:
  currency: BRL
  data_source: yfinance

  holdings:
    stocks:
      - { ticker: PRIO3, name: "PetroRio",    sector: "Oil & Gas", is_holding: true,
          sources: [BTG-Val, Suno-Acoes],            cvm_name: "PRIO " }
      - { ticker: VALE3, name: "Vale",        sector: "Mining",    is_holding: true,
          sources: [XP, BTG-Div, BTG-EqBR, Suno-Div], cvm_name: VALE }
      - { ticker: BBDC4, name: "Bradesco PN", sector: "Banks",     is_holding: true,
          sources: [BTG-EqBR],                        cvm_name: BRADESCO }
      - { ticker: ITSA4, name: "Itaúsa PN",   sector: "Holding",   is_holding: true,
          sources: [BTG-Div, BTG-EqBR, BTG-Val, Suno-Div, Suno-Tese], cvm_name: ITAUSA }
    fiis:
      - { ticker: XPML11, name: "XP Malls",              segment: "Shopping",   is_holding: true, sources: [user_pick, Suno-FII] }
      - { ticker: RBRX11, name: "RBR X",                 segment: "Híbrido",    is_holding: true, sources: [user_pick] }
      - { ticker: BTLG11, name: "BTG Logística",         segment: "Logística",  is_holding: true, sources: [user_pick, Suno-FII] }
      - { ticker: VGIR11, name: "Valora CRI",            segment: "Papel (CRI)", is_holding: true, sources: [user_pick] }
      - { ticker: PVBI11, name: "VBI Prime Properties",  segment: "Corporativo", is_holding: true, sources: [user_pick, Suno-FII] }
    etfs:
      - { ticker: LFTB11, name: "iShares Tesouro Selic ETF",  segment: "ETF-RF",   is_holding: true, sources: [user_pick] }
      - { ticker: IVVB11, name: "iShares S&P 500 (BRL hedged)", segment: "ETF-Eq", is_holding: true, sources: [user_pick] }

