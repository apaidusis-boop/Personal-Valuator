    stocks:
      # Tier 1 — 3+ casas
      - { ticker: PETR4, name: "Petrobras",    sector: "Oil & Gas", is_holding: false,
          tier: 1, sources: [XP, BTG-Div, BTG-EqBR, BTG-Val, Suno-Div], suno_target: 38.00,
          cvm_name: PETROBRAS }
      - { ticker: AXIA7, name: "Axia Energia", sector: "Utilities", is_holding: false,
          tier: 1, sources: [XP, BTG-Div, BTG-EqBR, BTG-Val],
          cvm_name: AXIA }
      - { ticker: CPLE3, name: "Copel",        sector: "Utilities", is_holding: false,
          tier: 1, sources: [XP, BTG-Div, BTG-EqBR, BTG-Val],
          cvm_name: COPEL }
      # Tier 2 — 2 casas
      - { ticker: ALOS3, name: "Allos",                sector: "Real Estate",      is_holding: false,
          tier: 2, sources: [XP, BTG-Div],             cvm_name: ALLOS }
      - { ticker: B3SA3, name: "B3",                   sector: "Financials",       is_holding: false,
          tier: 2, sources: [XP, BTG-EqBR, Suno-Acoes], suno_target: 16.90, cvm_name: B3 }
      - { ticker: ENGI11, name: "Energisa",            sector: "Utilities",        is_holding: false,
          tier: 2, sources: [XP, BTG-Val],             cvm_name: ENERGISA }
